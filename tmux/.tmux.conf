s1et -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g base-index 1
setw -g pane-base-index 1

set-option -g mode-keys vi

set-window-option -g automatic-rename on
set-option -g set-titles on

bind-key x kill-pane # skip "kill-pane 1? (y/n)" prompt

# remap prefix from 'C-b' to 'C-a'
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

bind-key J resize-pane -D 5
bind-key K resize-pane -U 5
bind-key H resize-pane -L 5
bind-key L resize-pane -R 5

# Vim style pane selection
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

bind S new-session

# copy and paste options
unbind Escape
bind [ copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind P paste-buffer

set -g @continuum-restore 'on'
set -g @continuum-boot 'on'

# sesh command for navigating tmux sessions via fzf
bind-key "t" run-shell "export PATH=/opt/homebrew/bin:$PATH; sesh connect \"$(sesh list | fzf-tmux -p 55%,60% --no-sort --reverse --ansi --border-label ' sesh ' --prompt '  ' --header '  ^a all ^t tmux ^g configs ^x zoxide ^d tmux kill ^f find' --bind 'tab:down,btab:up' --bind 'ctrl-a:change-prompt(  )+reload(sesh list --icons)' --bind 'ctrl-t:change-prompt(  )+reload(sesh list -t --icons)' --bind 'ctrl-g:change-prompt(  )+reload(sesh list -c --icons)' --bind 'ctrl-x:change-prompt(  )+reload(sesh list -z --icons)' --bind 'ctrl-f:change-prompt(  )+reload(fd -H -d 2 -t d -E .Trash . ~)' --bind 'ctrl-d:execute(tmux kill-session -t {E..})+change-prompt(  )+reload(sesh list --icons)')\""

bind r source-file ~/.tmux.conf \; display "Reloaded!"

set-option -g default-shell /opt/homebrew/bin/fish

set-option -g status-right ""

bind g display-popup -d "#{pane_current_path}" -w 80% -h 80% -E "lazygit"

set -g status-style "bg=#E7E8E9,fg=#575F66"
set -g pane-border-style "fg=#ABB0B6"
set -g pane-active-border-style "fg=#FF6A00"
set -g message-style "bg=#FAFAFA,fg=#575F66"

set -g status-left "[ #S ] "
set -g status-left-length 20

run -b '~/.tmux/plugins/tpm/tpm'
